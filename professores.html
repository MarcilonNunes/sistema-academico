<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculdade Vencer - Professores</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Faculdade Vencer - Professores</h1>
    <button id="logoutBtn">Sair</button>
</header>

<nav>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="alunos.html">Alunos</a></li>
        <li><a href="professores.html">Professores</a></li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="notas.html">Notas</a></li>
    </ul>
</nav>

<main>
    <section class="form-section">
        <h2>Cadastro de Professor</h2>
        <form id="professorForm">
            <input type="hidden" id="professorId">
            <input type="text" id="nomeProfessor" placeholder="Nome completo" required>
            <input type="email" id="emailProfessor" placeholder="Email" required>
            <input type="text" id="disciplina" placeholder="Disciplina" required>
            <button type="submit">Salvar</button>
        </form>
    </section>

    <section class="list-section">
        <h2>Lista de Professores</h2>
        <input type="text" id="searchProfessor" placeholder="Pesquisar professor">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Disciplina</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="professorTable">
                <!-- Professores aparecerão aqui -->
            </tbody>
        </table>
    </section>
</main>

<script src="js/main.js"></script>
<script src="js/professores.js"></script>
</body>
</html>
