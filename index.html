<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculdade Vencer - Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

<div class="login-container">
    <img src="assets/logo.png" alt="Logo Faculdade Vencer" class="logo">
    <h1>Login - Faculdade Vencer</h1>
    <form id="loginForm">
        <input type="email" id="emailLogin" placeholder="Email" required>
        <input type="password" id="senhaLogin" placeholder="Senha" required>
        <button type="submit">Entrar</button>
        <p class="error" id="erroLogin" style="display:none;">Email ou senha incorretos!</p>
    </form>
</div>

<script src="js/main.js"></script>
</body>
</html>
