<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculdade Vencer - Cursos</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Faculdade Vencer - Cursos</h1>
    <button id="logoutBtn">Sair</button>
</header>

<nav>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="alunos.html">Alunos</a></li>
        <li><a href="professores.html">Professores</a></li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="notas.html">Notas</a></li>
    </ul>
</nav>

<main>
    <section class="form-section">
        <h2>Cadastro de Curso</h2>
        <form id="cursoForm">
            <input type="hidden" id="cursoId">
            <input type="text" id="nomeCurso" placeholder="Nome do curso" required>
            <textarea id="descricaoCurso" placeholder="Descrição" required></textarea>
            <button type="submit">Salvar</button>
        </form>
    </section>

    <section class="list-section">
        <h2>Lista de Cursos</h2>
        <input type="text" id="searchCurso" placeholder="Pesquisar curso">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="cursoTable">
                <!-- Cursos aparecerão aqui -->
            </tbody>
        </table>
    </section>
</main>

<script src="js/main.js"></script>
<script src="js/cursos.js"></script>
</body>
</html>
