<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculdade Vencer - Notas</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Faculdade Vencer - Notas</h1>
    <button id="logoutBtn">Sair</button>
</header>

<nav>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="alunos.html">Alunos</a></li>
        <li><a href="professores.html">Professores</a></li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="notas.html">Notas</a></li>
    </ul>
</nav>

<main>
    <section class="form-section">
        <h2>Cadastro de Notas</h2>
        <form id="notaForm">
            <input type="hidden" id="notaId">
            <select id="alunoNota" required>
                <option value="">Selecione o aluno</option>
            </select>
            <select id="cursoNota" required>
                <option value="">Selecione o curso</option>
            </select>
            <input type="number" id="valorNota" placeholder="Nota (0-10)" min="0" max="10" step="0.1" required>
            <button type="submit">Salvar</button>
        </form>
    </section>

    <section class="list-section">
        <h2>Lista de Notas</h2>
        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Curso</th>
                    <th>Nota</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="notaTable">
                <!-- Notas aparecerão aqui -->
            </tbody>
        </table>
    </section>
</main>

<script src="js/main.js"></script>
<script src="js/notas.js"></script>
</body>
</html>
